<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00CFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#008CFF;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon: orbit circle -->
  <circle cx="32" cy="40" r="16" fill="none" stroke="url(#g1)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="32" cy="40" r="7" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="32" cy="40" r="3" fill="#0B0B0B"/>
  <!-- Wordmark -->
  <text x="60" y="52" font-family="Syne, Arial Black, sans-serif" font-weight="800" font-size="32" fill="url(#g1)" filter="url(#glow)" letter-spacing="1">MSTBRN</text>
  <!-- Tagline -->
  <text x="62" y="68" font-family="DM Sans, Arial, sans-serif" font-weight="400" font-size="11" fill="#888888" letter-spacing="3">COMMUNITY</text>
</svg>
